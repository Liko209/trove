<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitrove — Setup</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: #fafaf9;
        color: #1c1917;
        -webkit-font-smoothing: antialiased;
      }
      body { display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
      .card {
        width: 100%;
        max-width: 680px;
        background: #fff;
        border: 1px solid #e7e5e4;
        border-radius: 16px;
        padding: 36px 40px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      h1 {
        font-family: "New York", Georgia, "Times New Roman", serif;
        font-size: 30px;
        font-weight: 500;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }
      h2 { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #78716c; margin: 24px 0 12px; }
      .sub { color: #57534e; font-size: 14px; margin: 0 0 24px; line-height: 1.55; }
      .hw {
        background: #fafaf9;
        border: 1px solid #e7e5e4;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 12.5px;
        color: #57534e;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }
      .hw strong { color: #1c1917; }
      .tier-card {
        display: block;
        width: 100%;
        text-align: left;
        padding: 14px 16px;
        border: 1px solid #e7e5e4;
        border-radius: 10px;
        margin-bottom: 8px;
        background: #fff;
        cursor: pointer;
        transition: border-color 0.1s, background 0.1s;
      }
      .tier-card:hover { border-color: #a8a29e; }
      .tier-card.selected {
        border-color: #1c1917;
        background: #fafaf9;
      }
      .tier-head {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 4px;
      }
      .tier-head .name { font-weight: 500; font-size: 14px; }
      .tier-head .pill {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 1px 7px;
        border-radius: 9999px;
      }
      .pill.recommended { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
      .pill.active { background: #fef3c7; color: #92400e; }
      .pill.installed { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
      .tier-head .cost { margin-left: auto; font-size: 12px; color: #78716c; font-variant-numeric: tabular-nums; }
      .blurb { font-size: 12.5px; color: #78716c; line-height: 1.5; }
      .progress-card {
        margin-top: 18px;
        background: #fafaf9;
        border: 1px solid #e7e5e4;
        border-radius: 10px;
        padding: 14px 16px;
      }
      .progress-row { margin-top: 8px; }
      .progress-row:first-child { margin-top: 0; }
      .progress-row .label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #57534e;
        margin-bottom: 4px;
        font-variant-numeric: tabular-nums;
      }
      .progress-bar {
        height: 6px;
        background: #e7e5e4;
        border-radius: 9999px;
        overflow: hidden;
      }
      .progress-bar .fill {
        height: 100%;
        background: #1c1917;
        border-radius: 9999px;
        transition: width 0.2s;
      }
      .err {
        margin-top: 10px;
        padding: 8px 12px;
        font-size: 12px;
        color: #be123c;
        background: #fff1f2;
        border: 1px solid #fecdd3;
        border-radius: 8px;
      }
      .footer {
        margin-top: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .hint { font-size: 12.5px; color: #78716c; }
      button {
        font: inherit;
        cursor: pointer;
        border: 1px solid #d6d3d1;
        background: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        color: #292524;
        margin-left: auto;
      }
      button.primary {
        background: #1c1917;
        color: #fff;
        border-color: #1c1917;
      }
      button.primary:hover:not(:disabled) { background: #292524; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Set up Bitrove</h1>
      <p class="sub">
        Bitrove indexes your files with an on-device AI model — nothing leaves
        this Mac. Pick a model tier matched to your hardware. You can switch
        later in Settings → Models.
      </p>

      <div class="hw" id="hw">Detecting your Mac…</div>

      <h2>Choose a tier</h2>
      <div id="tiers"></div>

      <div id="progress" hidden></div>
      <div id="err" class="err" hidden></div>

      <div class="footer">
        <span class="hint" id="hint">Pick a tier to continue.</span>
        <button id="action" class="primary" disabled>Download &amp; start</button>
      </div>
    </main>

    <script>
      const t = /** @type {any} */ (window).bitrove;
      if (!t) {
        document.body.innerHTML =
          '<div class="card"><h1>Setup unavailable</h1><p class="sub">The setup bridge did not load. Please relaunch Bitrove.</p></div>';
      }

      const hwEl = document.getElementById("hw");
      const tiersEl = document.getElementById("tiers");
      const progressEl = document.getElementById("progress");
      const errEl = document.getElementById("err");
      const hintEl = document.getElementById("hint");
      const actionBtn = document.getElementById("action");

      /** @type {any[]} */ let tiers = [];
      /** @type {string} */ let recommended = "light";
      /** @type {string} */ let active = "light";
      /** @type {string | null} */ let selected = null;
      /** @type {Record<string,any>} */ let statuses = {};
      let downloading = false;

      function pct(s) {
        const t = s?.totalBytes || s?.approxBytes || 0;
        const d = s?.downloadedBytes || 0;
        return t > 0 ? Math.min(100, Math.round((d / t) * 100)) : 0;
      }
      function partialBytes() {
        return (statuses.embed?.downloadedBytes || 0) + (statuses.rerank?.downloadedBytes || 0);
      }
      function hasPartial() {
        const e = statuses.embed, r = statuses.rerank;
        return (
          (e && e.status !== "ready" && (e.downloadedBytes || 0) > 0) ||
          (r && r.status !== "ready" && (r.downloadedBytes || 0) > 0)
        );
      }
      function hasError() {
        return statuses.embed?.status === "error" || statuses.rerank?.status === "error";
      }
      function errorMessage() {
        const e = statuses.embed?.error, r = statuses.rerank?.error;
        return [e && "embed: " + e, r && "reranker: " + r].filter(Boolean).join(" · ");
      }

      function fmtBytes(n) {
        if (!n && n !== 0) return "—";
        if (n < 1024 * 1024) return (n / 1024).toFixed(0) + " KB";
        if (n < 1024 * 1024 * 1024) return Math.round(n / 1024 / 1024) + " MB";
        return (n / (1024 * 1024 * 1024)).toFixed(1) + " GB";
      }

      function renderTiers() {
        tiersEl.innerHTML = "";
        for (const tier of tiers) {
          const card = document.createElement("button");
          card.className = "tier-card" + (selected === tier.id ? " selected" : "");
          card.onclick = () => { selected = tier.id; renderTiers(); updateAction(); };

          const head = document.createElement("div");
          head.className = "tier-head";
          const pills = [];
          if (tier.installed) pills.push('<span class="pill installed">Installed</span>');
          if (tier.id === recommended) pills.push('<span class="pill recommended">Recommended</span>');
          if (tier.id === active) pills.push('<span class="pill active">Current</span>');
          // Replace the size estimate with "no download needed" when
          // the user already has this tier's model on disk — saves
          // them re-downloading 2 GB after a settings reset bug.
          const costLine = tier.installed
            ? '<span class="cost" style="color:#047857;">Ready · ~' + tier.estDocsPerSec + ' docs/s</span>'
            : '<span class="cost">' + fmtBytes(tier.embed.approxBytes) +
              ' · ~' + tier.estDocsPerSec + ' docs/s</span>';
          head.innerHTML =
            '<span class="name">' + tier.label + '</span>' +
            pills.join("") +
            costLine;
          card.appendChild(head);

          const blurb = document.createElement("div");
          blurb.className = "blurb";
          blurb.textContent = tier.blurb;
          card.appendChild(blurb);

          tiersEl.appendChild(card);
        }
      }

      function updateAction() {
        if (!selected) {
          actionBtn.disabled = true;
          hintEl.textContent = "Pick a tier to continue.";
          return;
        }
        const tier = tiers.find((x) => x.id === selected);
        const approxTotal = (tier.embed.approxBytes || 0) + 438_000_000; // reranker fixed
        actionBtn.disabled = downloading;

        // Button text + hint adapt to current state so the user knows
        // what they're committing to: fresh download, resume from a
        // partial, retry after an error, or a zero-cost "Use installed".
        const partial = hasPartial();
        const errored = hasError();
        const installed = !!tier.installed;
        if (downloading) {
          actionBtn.textContent = "Starting…";
        } else if (errored) {
          actionBtn.textContent = "Retry download";
        } else if (partial) {
          actionBtn.textContent = "Resume download";
        } else if (installed) {
          actionBtn.textContent = "Use " + tier.label;
        } else {
          actionBtn.textContent = "Download & start";
        }

        if (errored) {
          hintEl.textContent = "Previous attempt failed — click Retry to continue.";
        } else if (partial) {
          const remaining = Math.max(0, approxTotal - partialBytes());
          hintEl.textContent = "Resuming " + tier.label +
            " · " + fmtBytes(remaining) + " left of " + fmtBytes(approxTotal);
        } else if (installed) {
          hintEl.textContent = tier.label + " is already on disk · no download needed";
        } else {
          hintEl.textContent = "Selected " + tier.label +
            " · " + fmtBytes(approxTotal) + " total (embed + reranker)";
        }
      }

      function renderProgress() {
        const ids = ["embed", "rerank"];
        // Show the card whenever there's anything interesting to look
        // at: an active transfer, a half-finished .part on disk, or an
        // error message. Stays hidden only on a truly fresh install.
        const interesting = ids.some((id) => {
          const s = statuses[id];
          if (!s) return false;
          if (s.status === "downloading" || s.status === "verifying" || s.status === "error") return true;
          if ((s.downloadedBytes || 0) > 0 && s.status !== "ready") return true;
          return false;
        });
        if (!interesting && !downloading) {
          progressEl.hidden = true;
          return;
        }
        progressEl.hidden = false;
        progressEl.innerHTML = '<div class="progress-card"></div>';
        const cont = progressEl.firstElementChild;
        for (const id of ids) {
          const s = statuses[id];
          if (!s) continue;
          const total = s.totalBytes || s.approxBytes || 0;
          const done = s.downloadedBytes || 0;
          const p = pct(s);
          const row = document.createElement("div");
          row.className = "progress-row";
          const fmtSpeed = s.speedBps
            ? (s.speedBps < 1024 * 1024
                ? (s.speedBps / 1024).toFixed(0) + " KB/s"
                : (s.speedBps / 1024 / 1024).toFixed(1) + " MB/s")
            : "";
          // Status label maps onto the actual lifecycle: a partial
          // download with status="missing" + downloadedBytes>0 means
          // the user came back to a half-finished transfer.
          let statusLabel;
          if (s.status === "ready") statusLabel = "Ready";
          else if (s.status === "verifying") statusLabel = "Verifying";
          else if (s.status === "downloading") statusLabel = "Downloading";
          else if (s.status === "error") statusLabel = "Error";
          else if (done > 0) statusLabel = "Paused at " + p + "%";
          else statusLabel = "Pending";
          row.innerHTML =
            '<div class="label"><span>' + (s.displayName || id) + ' · ' +
            statusLabel +
            '</span><span>' + fmtBytes(done) + ' / ' + fmtBytes(total) +
            (fmtSpeed ? ' · ' + fmtSpeed : "") + '</span></div>' +
            '<div class="progress-bar"><div class="fill" style="width:' + p + '%"></div></div>';
          cont.appendChild(row);
        }
      }

      async function init() {
        try {
          const data = await t.listTiers();
          tiers = data.tiers;
          recommended = data.recommended;
          active = data.active;
          statuses = data.statuses || {};
          // If the user came back to a half-finished download, default
          // the selection to the tier whose embed model matches that
          // .part — so clicking Resume keeps that progress instead of
          // silently switching tiers.
          selected = recommended;
          // Default priority: resume a partial / errored download
          // first, then keep an already-installed tier (so a user
          // whose settings got reset doesn't have to re-download),
          // then fall back to the recommended tier.
          if (hasPartial() || hasError()) {
            const match = tiers.find((x) => x.embed.displayName === statuses.embed?.displayName);
            if (match) selected = match.id;
            else if (active) selected = active;
          } else {
            const activeInstalled = tiers.find((x) => x.id === active && x.installed);
            if (activeInstalled) {
              selected = active;
            } else {
              const anyInstalled = tiers.find((x) => x.installed);
              if (anyInstalled) selected = anyInstalled.id;
            }
          }
          hwEl.innerHTML = '<span><strong>' + data.hardware.cpuModel + '</strong> · ' +
            data.hardware.totalRamGB + ' GB · ' + data.hardware.arch + '</span>' +
            '<span>Recommended: <strong>' +
            (tiers.find((x) => x.id === recommended)?.label || recommended) +
            '</strong></span>';
          renderTiers();
          renderProgress();
          updateAction();
          if (hasError()) {
            errEl.hidden = false;
            errEl.textContent = "Last attempt: " + errorMessage();
          }
        } catch (e) {
          errEl.hidden = false;
          errEl.textContent = "Failed to read tiers: " + (e?.message || e);
        }

        // Stream download status updates from the existing channel.
        try {
          t.onModelsUpdate((s) => {
            statuses = s;
            renderProgress();
            updateAction();
            if (hasError() && !downloading) {
              errEl.hidden = false;
              errEl.textContent = errorMessage();
            }
          });
        } catch {}
      }

      actionBtn.addEventListener("click", async () => {
        if (!selected || downloading) return;
        downloading = true;
        errEl.hidden = true;
        updateAction();
        try {
          await t.downloadForTier(selected);
          actionBtn.textContent = "Starting Bitrove…";
          await t.startServices();
        } catch (e) {
          errEl.hidden = false;
          errEl.textContent = "Setup failed: " + (e?.message || e);
          downloading = false;
          updateAction();
        }
      });

      init();
    </script>
  </body>
</html>
